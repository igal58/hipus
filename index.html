<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">חיפוש כרטיסי טיסה</title>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icons/7.2.3/css/flag-icons.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Heebo:wght@400;500;600;700;800&display=swap">
<style>
/* ── ערכות צבעים (dark variants) ── */
:root{
  --bg-a:#0b1120;--bg-b:#111a2e;--panel:#161f33;--panel2:#1e2940;
  --accent:#2563eb;--accent2:#3b82f6;--text:#e8edf6;--muted:#9aa7bd;
  --good:#16a34a;--line:#27324a;--gold:#f59e0b;
  --shadow:0 1px 2px rgba(0,0,0,.30),0 8px 28px rgba(0,0,0,.28);
  --shadow-sm:0 1px 3px rgba(0,0,0,.30);
  --radius:16px;--radius-sm:12px;
  --accent-ink:#fff;
}
body.theme-ocean  {--bg-a:#042f2e;--bg-b:#064e3b;--panel:#065f46;--panel2:#047857;--accent:#34d399;--accent2:#10b981;--text:#ecfdf5;--muted:#6ee7b7;--good:#4ade80;--line:#065f46}
body.theme-sunset {--bg-a:#1c0a00;--bg-b:#3b1204;--panel:#431407;--panel2:#5c1a0a;--accent:#fb923c;--accent2:#f97316;--text:#fff7ed;--muted:#fed7aa;--good:#86efac;--line:#7c2d12}
body.theme-purple {--bg-a:#1e1b4b;--bg-b:#312e81;--panel:#3730a3;--panel2:#4338ca;--accent:#a78bfa;--accent2:#818cf8;--text:#ede9fe;--muted:#c4b5fd;--good:#86efac;--line:#4338ca}
body.theme-slate  {--bg-a:#1e293b;--bg-b:#334155;--panel:#334155;--panel2:#475569;--accent:#94a3b8;--accent2:#64748b;--text:#f8fafc;--muted:#cbd5e1;--good:#4ade80;--line:#475569}
body.theme-rose   {--bg-a:#1a0010;--bg-b:#3b0024;--panel:#4c0030;--panel2:#6b003f;--accent:#f472b6;--accent2:#ec4899;--text:#fdf2f8;--muted:#fbcfe8;--good:#86efac;--line:#6b003f}

/* ── מצב בהיר (פרימיום, ברירת מחדל) ── */
body.light{
  --bg-a:#f6f8fb;--bg-b:#eef2f7;--panel:#ffffff;--panel2:#f4f7fb;
  --text:#0f1b2d;--muted:#5b6b85;--line:#e6ebf2;
  --shadow:0 1px 2px rgba(16,24,40,.05),0 10px 30px rgba(16,24,40,.07);
  --shadow-sm:0 1px 3px rgba(16,24,40,.08);
  --accent-ink:#fff;
}

*{box-sizing:border-box;transition:background-color .22s,color .22s,border-color .22s}
body{margin:0;font-family:"Inter","Heebo","Segoe UI",Tahoma,Arial,sans-serif;
  background:var(--bg-a);
  color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}
.fa-fw{width:1.1em;text-align:center}

header{text-align:center;padding:26px 16px 6px}
header h1{margin:0;font-size:26px;font-weight:800;letter-spacing:-.02em;
  display:flex;align-items:center;justify-content:center;gap:10px}
header h1 .fa-solid{color:var(--accent);font-size:22px}
header p{color:var(--muted);margin:6px 0 0;font-size:14px}

/* ── TOOLBAR ── */
.toolbar{max-width:1020px;margin:8px auto 0;display:flex;align-items:center;
  gap:10px;flex-wrap:wrap;padding:0 12px;justify-content:space-between;
  direction:ltr}  /* קבוע — לא זז בין עברית לאנגלית */
.toolbar-left,.toolbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* בחירת שפה — segmented control */
.lang-bar{display:flex;gap:2px;background:var(--panel2);
  border:1px solid var(--line);border-radius:12px;padding:3px}
.lang-btn{background:transparent;border:none;color:var(--muted);
  border-radius:9px;padding:6px 13px;cursor:pointer;font-size:13px;font-weight:600;min-width:42px}
.lang-btn.active{background:var(--panel);color:var(--accent);box-shadow:var(--shadow-sm)}
body:not(.light) .lang-btn.active{background:var(--accent);color:#fff}
.lang-btn:hover:not(.active){color:var(--text)}

/* מצב כהה/בהיר */
.theme-toggle{display:inline-flex;align-items:center;gap:7px;background:var(--panel);
  border:1px solid var(--line);color:var(--text);border-radius:12px;padding:7px 13px;
  cursor:pointer;font-size:13px;font-weight:600}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
.theme-toggle .fa-solid{font-size:14px}

/* ערכת צבעים */
.palette{display:flex;align-items:center;gap:6px}
.palette-lbl{font-size:12px;color:var(--muted)}
.swatch{width:21px;height:21px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:transform .12s,border-color .12s}
.swatch:hover,.swatch.active{transform:scale(1.3);border-color:var(--text)}
.sw-dark  {background:linear-gradient(135deg,#0f172a,#38bdf8)}
.sw-ocean {background:linear-gradient(135deg,#042f2e,#34d399)}
.sw-sunset{background:linear-gradient(135deg,#1c0a00,#fb923c)}
.sw-purple{background:linear-gradient(135deg,#1e1b4b,#a78bfa)}
.sw-slate {background:linear-gradient(135deg,#1e293b,#94a3b8)}
.sw-rose  {background:linear-gradient(135deg,#1a0010,#f472b6)}

/* ── SEARCH CARD ── */
.search-card{max-width:1020px;margin:14px auto;background:var(--panel);
  border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;
  box-shadow:var(--shadow)}
.grid{display:grid;gap:13px;grid-template-columns:repeat(auto-fit,minmax(168px,1fr))}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
.field input,.field select{width:100%;padding:10px 12px;border-radius:10px;
  border:1px solid var(--line);background:var(--panel2);color:var(--text);
  font-size:15px;outline:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.actions{display:flex;gap:10px;align-items:flex-end;margin-top:14px;flex-wrap:wrap}
.pax-field{margin:0;flex:0 0 160px}
.pax-field label{margin-bottom:5px}
.actions button.search,.actions button.deals-btn{align-self:flex-end}
/* primary CTA — solid accent, clean */
button.search{display:inline-flex;align-items:center;gap:9px;background:var(--accent);
  color:#fff;border:0;font-weight:700;font-size:15px;
  padding:12px 28px;border-radius:12px;cursor:pointer;box-shadow:var(--shadow-sm)}
button.search:hover{background:var(--accent2)}
.rate{color:var(--muted);font-size:13px}
/* secondary buttons — subtle, less dominant than the CTA */
button.deals-btn,button.cal-btn{display:inline-flex;align-items:center;gap:8px;background:var(--panel2);
  color:var(--text);border:1px solid var(--line);font-weight:600;font-size:14px;
  padding:12px 18px;border-radius:12px;cursor:pointer;box-shadow:none}
button.deals-btn:hover,button.cal-btn:hover{border-color:var(--accent);color:var(--accent);filter:none}
button.deals-btn .fa-solid{color:#f97316}
button.cal-btn .fa-solid{color:var(--accent)}

/* ── RESULTS ── */
.results{max-width:1020px;margin:4px auto 60px;padding:0 8px}
.results-head{display:flex;justify-content:space-between;align-items:center;
  margin:12px 4px 0;flex-wrap:wrap;gap:8px}
.results-head h2{margin:0;font-size:18px}

/* ── CONTROL BAR ── */
.ctrl-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;
  background:var(--panel);border:1px solid var(--line);
  border-radius:12px;padding:9px 13px;margin:8px 4px 12px}
.ctrl-section{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ctrl-sep{width:1px;height:22px;background:var(--line);margin:0 4px}
.ctrl-lbl{font-size:12px;color:var(--muted);white-space:nowrap}
.ctrl-btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);
  border-radius:20px;padding:4px 12px;font-size:13px;cursor:pointer;font-weight:600;white-space:nowrap}
.ctrl-btn.active{background:var(--accent);color:#04293f;border-color:var(--accent)}
.ctrl-btn:hover:not(.active){border-color:var(--accent)}

/* ── TICKET ── */
.ticket{display:grid;grid-template-columns:auto 1fr auto auto;gap:14px;
  align-items:center;background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:13px 16px;margin-bottom:9px;
  transition:transform .12s,border-color .12s}
.ticket:hover{transform:translateY(-2px);border-color:var(--accent)}
.ticket.cheapest{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
.airline{display:flex;align-items:center;gap:9px;min-width:100px}
.logo{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;
  font-weight:800;color:#fff;font-size:15px;background:var(--accent)}
.airline-name{font-size:13px;line-height:1.3}
.muted-sm{color:var(--muted);font-size:11px}
.dir-ic{color:var(--muted);font-size:.82em;margin:0 5px}
[dir=rtl] .dir-ic.fa-arrow-right-long{transform:scaleX(-1)}
.dot{color:var(--muted);opacity:.55;margin:0 1px}
.route .meta i{opacity:.7;margin-inline-end:2px}
.price .ils .fa-solid{display:none}
.route .cities{font-weight:700;font-size:15px}
.route .meta{color:var(--muted);font-size:12px;margin-top:3px;
  display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.stops-pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
.s0{background:#dcfce7;color:#166534}
.s1{background:#fef9c3;color:#713f12}
.s2{background:#fee2e2;color:#991b1b}
body.light .s0{background:#14532d;color:#dcfce7}
body.light .s1{background:#854d0e;color:#fef9c3}
body.light .s2{background:#991b1b;color:#fee2e2}
.badge{font-size:11px;background:var(--gold);color:#3b2c00;
  padding:2px 8px;border-radius:20px;font-weight:700;margin-inline-start:6px}
.flex-pill{display:inline-block;font-size:12px;background:var(--accent);color:#fff;
  padding:2px 9px;border-radius:20px;font-weight:700}
body.light .flex-pill{color:#04293f}
.price{text-align:center}
.price .ils{font-size:20px;font-weight:800;color:var(--accent)}
.price .usd{color:var(--muted);font-size:13px;margin-top:2px}
.buy{display:inline-flex;align-items:center;justify-content:center;gap:7px;
  background:var(--good);color:#fff;text-decoration:none;
  font-weight:700;padding:10px 16px;border-radius:10px;white-space:nowrap;font-size:13px}
.buy:hover{filter:brightness(1.06)}
.buy .fa-solid{font-size:11px}
.cbtn-ic{color:var(--muted);font-size:11px;margin-inline-start:2px}
.badge .fa-solid{font-size:9px;margin-inline-end:2px}
.empty{text-align:center;color:var(--muted);padding:40px;font-size:15px}

/* ── SEARCH SUMMARY ── */
.search-summary{background:var(--panel);border:1px solid var(--line);
  border-radius:12px;padding:12px 16px;margin:8px 4px 12px}
.ss-route{font-size:16px;font-weight:700;color:var(--accent)}
.ss-sub{font-size:13px;color:var(--muted);margin-top:3px}
.ss-price{font-size:15px;font-weight:800;color:var(--good);margin-top:7px;min-height:20px}

/* ── ENGINE CARD (clickable link) ── */
a.engine-card{grid-template-columns:auto 1fr auto auto;text-decoration:none;color:inherit;cursor:pointer}
a.engine-card:hover{border-color:var(--accent)}
.card-price{min-width:78px}
.card-price .usd{font-size:11px}
.ref-note{font-size:10px;color:var(--muted);opacity:.8;font-style:italic;margin-top:1px;cursor:help}
.offers-head,.compare-head,.flexmonths-head{font-weight:800;color:var(--accent);font-size:15px;margin:18px 4px 9px}
.compare-head{color:var(--muted);font-size:14px;margin-top:22px}
.flexmonths-head{margin-top:22px}
.flexmonths-sub{color:var(--muted);font-size:13px;margin:0 4px 10px}
.compare-row{display:flex;flex-wrap:wrap;gap:10px}
.compare-btn{display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit;
  background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 12px;transition:border-color .15s}
.compare-btn:hover{border-color:var(--accent)}
.compare-btn .clogo{width:26px;height:26px;border-radius:6px;color:#fff;display:flex;
  align-items:center;justify-content:center;font-weight:800;font-size:11px;flex:0 0 auto}
.compare-btn .cname{font-size:14px;font-weight:600}
a.best-card{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset;margin-bottom:9px}

/* ── HOT DEALS / budget (deals-btn styled in the primary/secondary block above) ── */
.budget-in{align-self:flex-end;width:130px;padding:12px 12px;border-radius:12px;
  border:1px solid var(--line);background:var(--panel2);color:var(--text);font-size:15px}
.field-hint{display:block;margin-top:5px;font-size:11.5px;line-height:1.4;color:var(--muted)}
.field-hint.active{color:var(--accent);font-weight:600}
.cal-btn{align-self:flex-end}
.cal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-top:14px}
.cal-cell{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:12px;
  padding:12px 8px;cursor:pointer;text-align:center;transition:transform .1s,border-color .1s;font-family:inherit}
.cal-cell:hover{transform:translateY(-2px);border-color:var(--accent)}
.cal-cell .cal-d{font-size:13px;color:var(--muted)}
.cal-cell .cal-p{font-size:17px;font-weight:700;margin-top:4px}
.cal-cell.cal-min{border-color:var(--good);box-shadow:0 0 0 1px var(--good)}
.cal-cell .cal-tag{font-size:11px;color:var(--good);font-weight:700;margin-top:3px}
.alert-box{margin-top:18px;padding:16px;border:1px solid var(--line);border-radius:14px;background:var(--panel)}
.alert-head{font-size:17px;font-weight:700}
.alert-sub{color:var(--muted);font-size:13px;margin:4px 0 12px}
.alert-form{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.alert-in{padding:11px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--text);font-size:15px}
#alertEmail{flex:1;min-width:180px}
#alertTarget{width:130px}
.alert-btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:0;font-weight:700;font-size:15px;padding:11px 20px;border-radius:12px;cursor:pointer}
.alert-btn:hover{background:var(--accent2)}
.alert-msg{margin-top:10px;font-size:14px;font-weight:600;min-height:18px}
.alert-msg.ok{color:var(--good)}
.alert-msg.err{color:#f87171}
.deal-row{cursor:pointer}
.deal-row .logo{font-size:12px}

/* ── PASSENGERS ── */
.pax-wrap{position:relative}
.pax-btn{width:100%;padding:11px 12px;border-radius:12px;border:1px solid var(--line);
  background:var(--panel2);color:var(--text);font-size:15px;cursor:pointer;text-align:start;
  display:flex;align-items:center;gap:8px}
.pax-btn .fa-solid{color:var(--muted)}
.pax-sep{color:var(--muted);margin:0 2px}
.pax-btn:hover{border-color:var(--accent)}
.pax-panel{position:absolute;top:calc(100% + 4px);inset-inline-start:0;inset-inline-end:0;z-index:999;
  background:var(--panel2);border:1px solid var(--accent);border-radius:10px;
  box-shadow:0 8px 24px rgba(0,0,0,.45);padding:6px;display:none}
.pax-panel.open{display:block}
.pax-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 6px}
.pax-row+.pax-row{border-top:1px solid var(--line)}
.pax-info{display:flex;flex-direction:column}
.pax-info small{color:var(--muted);font-size:11px}
.pax-ctl{display:flex;align-items:center;gap:10px}
.pax-ctl button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);
  background:var(--panel);color:var(--text);font-size:18px;cursor:pointer;line-height:1}
.pax-ctl button:hover{border-color:var(--accent);color:var(--accent)}
.pax-ctl span{min-width:18px;text-align:center;font-weight:700}
.pax-group{font-size:12px;font-weight:700;color:var(--muted);padding:8px 6px 2px;
  margin-top:4px;border-top:1px solid var(--line)}

/* ── AUTOCOMPLETE ── */
.ac-wrap{position:relative}
.ac-wrap input{width:100%;padding-inline-start:40px}
/* select + input flag adornments */
.sel-wrap{position:relative;display:flex;align-items:center}
.sel-wrap select{width:100%;padding-inline-start:40px;padding-inline-end:34px;-webkit-appearance:none;appearance:none}
.sel-flag{position:absolute;inset-inline-start:12px;width:22px;height:16px;border-radius:3px;
  box-shadow:0 0 0 1px rgba(0,0,0,.1);z-index:2;pointer-events:none}
.sel-caret{position:absolute;inset-inline-end:13px;color:var(--muted);font-size:12px;pointer-events:none;z-index:2}
.ac-pin{display:none}
.ac-flag{width:24px;height:18px;border-radius:3px;flex-shrink:0;box-shadow:0 0 0 1px rgba(0,0,0,.08)}
.ac-drop{position:absolute;top:calc(100% + 4px);inset-inline-start:0;inset-inline-end:0;
  z-index:999;background:var(--panel2);border:1px solid var(--accent);
  border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.45);
  display:none;max-height:260px;overflow-y:auto}
.ac-drop.open{display:block}
.ac-item{padding:8px 12px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--accent);color:#fff;font-weight:600}
.ac-item:hover .ac-city,.ac-item:hover .ac-iata{color:#fff;background:rgba(255,255,255,.2)}
.ac-iata{font-size:11px;background:var(--panel);color:var(--muted);padding:2px 6px;
  border-radius:6px;font-weight:700;min-width:32px;text-align:center;flex-shrink:0}
.ac-names{flex:1;display:flex;flex-direction:column;gap:1px}
.ac-country{font-size:13px;font-weight:600}
.ac-city{font-size:12px;color:var(--muted)}
.ac-empty{padding:12px;color:var(--muted);font-size:14px}

@media(max-width:640px){
  .ticket{grid-template-columns:1fr 1fr;gap:10px}
  .buy{grid-column:1/-1;text-align:center}
  .toolbar{justify-content:flex-start}
}
</style>
</head>
<body>

<header>
  <h1><i class="fa-solid fa-plane-up" aria-hidden="true"></i><span id="hTitle">חיפוש כרטיסי טיסה</span></h1>
  <p id="hSub">השוואת מחירים בשקלים ובדולרים — מיון וסינון בזמן אמת</p>
</header>

<div class="toolbar">
  <div class="toolbar-left">
    <!-- בחירת שפה -->
    <div class="lang-bar">
      <button class="lang-btn active" data-lang="he">עב</button>
      <button class="lang-btn"        data-lang="en">EN</button>
      <button class="lang-btn"        data-lang="ru">RU</button>
    </div>
    <!-- מצב בהיר/כהה -->
    <button class="theme-toggle" id="lightToggle"></button>
  </div>
  <div class="toolbar-right">
    <div class="palette">
      <span class="palette-lbl" id="paletteLabel">ערכה:</span>
      <div class="swatch sw-dark   active" data-theme="dark"   title="כחול כהה"></div>
      <div class="swatch sw-ocean"         data-theme="ocean"  title="ים"></div>
      <div class="swatch sw-sunset"        data-theme="sunset" title="שקיעה"></div>
      <div class="swatch sw-purple"        data-theme="purple" title="סגול"></div>
      <div class="swatch sw-slate"         data-theme="slate"  title="אפור"></div>
      <div class="swatch sw-rose"          data-theme="rose"   title="ורוד"></div>
    </div>
  </div>
</div>

<section class="search-card">
  <div class="grid">
    <div class="field">
      <label id="lFrom">ארץ יציאה</label>
      <div class="sel-wrap">
        <span class="fi sel-flag" id="fromFlag" aria-hidden="true"></span>
        <select id="from"></select>
        <i class="fa-solid fa-chevron-down sel-caret" aria-hidden="true"></i>
      </div>
    </div>
    <div class="field">
      <label id="lTo">ארץ / עיר יעד</label>
      <div class="ac-wrap">
        <span class="fi sel-flag" id="toFlag" aria-hidden="true"></span>

  DL:{he:"דלתא",en:"Delta",ru:"Delta"},

/* קוד מדינה ISO-3166 alpha-2 לדגל (flag-icons) — מסיר ספרה נגררת מקודים כמו US7/GE3 */

function flagSpan(c,extra){ return `<span class="fi fi-${isoOf(c)} ${extra||""}"></span>`; }

/* ══════════════════════════════════════════
   תאריכים DD/MM/YYYY
══════════════════════════════════════════ */
const pad=n=>String(n).padStart(2,"0");
const fmtDMY=d=>`${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
const fmtISO=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
function parseDMY(s){
  const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec((s||"").trim());
  if(!m) return null;
  const d=new Date(+m[3],+m[2]-1,+m[1]);
  return isNaN(d)?null:d;
}
function maskDate(e){
  let v=e.target.value.replace(/\D/g,"").slice(0,8);
  if(v.length>=5) v=v.slice(0,2)+"/"+v.slice(2,4)+"/"+v.slice(4);
  else if(v.length>=3) v=v.slice(0,2)+"/"+v.slice(2);
  e.target.value=v;
}
const dateOut   =document.getElementById("dateOut");
const dateReturn=document.getElementById("dateReturn");
const nights    =document.getElementById("nights");
[dateOut,dateReturn].forEach(el=>el.addEventListener("input",maskDate));
function syncRet(){ const dep=parseDMY(dateOut.value),n=Number(nights.value); if(n===0){dateReturn.value="";return;} if(dep&&n>0){const r=new Date(dep);r.setDate(r.getDate()+n);dateReturn.value=fmtDMY(r);} }
function syncNts(){ const dep=parseDMY(dateOut.value),ret=parseDMY(dateReturn.value); if(dep&&ret){const d=Math.round((ret-dep)/86400000);if(d>0)nights.value=d;} }
/* הערת "ימי שהייה" — מסבירה שהפונקציה קיימת, ומדגישה כשהערך 0 (חיפוש גמיש) */
function updateNightsHint(){
  const el=document.getElementById("nightsHint");
  if(!el) return;
  const t=T[currentLang];
  if(Number(nights.value)===0){ el.innerHTML='<i class="fa-solid fa-plane-departure" aria-hidden="true"></i> '+t.nightsHintActive; el.classList.add("active"); }
  else { el.innerHTML='<i class="fa-regular fa-lightbulb" aria-hidden="true"></i> '+t.nightsHint; el.classList.remove("active"); }
}
dateOut.addEventListener("change",syncRet);
nights.addEventListener("input",()=>{ syncRet(); updateNightsHint(); });
dateReturn.addEventListener("change",syncNts);
dateOut.value=fmtDMY(new Date());
syncRet();
updateNightsHint();

/* ── בניית קישורים חיים אמיתיים לאתרי חיפוש הטיסות ──
   כל קישור פותח חיפוש אמיתי עם המסלול והתאריכים שנבחרו */
function fmtSky(d){ return `${String(d.getFullYear()).slice(2)}${pad(d.getMonth()+1)}${pad(d.getDate())}`; } // YYMMDD
function buildEngines(fromC,toC,dep,ret){
  const o=fromC.iata, d=toC.iata;
  const depI=fmtISO(dep), retI=fmtISO(ret);
  const a=pax.adults, ch=pax.children, inf=pax.infants;
  const qPax=`adults=${a}&children=${ch}&infants=${inf}`;          /* Skyscanner / Kiwi */
  const gPax=`${a} adult${a>1?"s":""}${ch?` ${ch} children`:""}${inf?` ${inf} infants`:""}`; /* Google text */
  const total=a+ch+inf;
  return [
    { name:"Google Flights", code:"G", color:"#4285f4",
      url:`https://www.google.com/travel/flights?q=${encodeURIComponent(`flights from ${o} to ${d} on ${depI} returning ${retI}${total>1?` for ${gPax}`:""}${bags.checked?` with ${bags.checked} checked bags`:""}`)}` },
    { name:"Skyscanner", code:"SK", color:"#0770e3",
      url:`https://www.skyscanner.net/transport/flights/${o.toLowerCase()}/${d.toLowerCase()}/${fmtSky(dep)}/${fmtSky(ret)}/?${qPax}&cabinclass=economy` },
    { name:"Kiwi.com", code:"KW", color:"#00a991",
      url:`https://www.kiwi.com/en/search/results/${o}/${d}/${depI}/${retI}?${qPax}` },
    { name:"Kayak", code:"KY", color:"#ff690f",
      url:`https://www.kayak.com/flights/${o}-${d}/${depI}/${retI}/${a}adults${ch?`/${ch}children`:""}` },
    { name:"Momondo", code:"MO", color:"#e6175c",
      url:`https://www.momondo.com/flight-search/${o}-${d}/${depI}/${retI}/${a}adults${ch?`/${ch}children`:""}` },
    /* El Al — אין מחיר במקור הנתונים (Aviasales לא כולל את אל על); קישור לדף הטיסות מישראל לפי שפה
       (אין deep-link ציבורי יציב עם מסלול/תאריכים → מפנים לדף הזמנות אמיתי, בלי להמציא פרמטרים) */
    { name:"El Al", code:"LY", color:"#003399",
      url:`https://www.elal.com/${currentLang==="he"?"heb":"eng"}/israel`, noPrice:true },
  ];
}

function render(){
  const t=T[currentLang];
  const box=document.getElementById("results");
  if(!lastSearch){ box.innerHTML=""; return; }
  const {fromC,toC,dep,ret}=lastSearch;
  const fromN=cLng(fromC), toN=cLng(toC);
  const engines=buildEngines(fromC,toC,dep,ret);

  const head=`
  <div class="results-head">
    <h2>${t.resTitle}</h2>
  </div>
  <div class="search-summary">
    <div class="ss-route">${t.routeFor(`${fromN.c} (${fromC.iata})`,`${toN.c} (${toC.iata})`,fmtDMY(dep),fmtDMY(ret))}${lastSearch.flex?` · <span class="flex-pill">${t.flexLbl}</span>`:""}</div>
    <div class="ss-sub">${t.resSub}</div>
    <div class="ss-price" id="ssPrice"></div>
  </div>`;

  /* קישורי השוואה לאתרים אחרים — בלי מחיר (אין לנו מחיר אמיתי מהם), כולל El Al */
  const compare=`
    <div class="compare-head"><i class="fa-solid fa-magnifying-glass-location" aria-hidden="true"></i> ${t.compareTitle}</div>
    <div class="compare-row">`+engines.map(e=>`
      <a class="compare-btn" href="${e.url}" target="_blank" rel="noopener">
        <span class="clogo" style="background:${e.color}">${e.code}</span>
        <span class="cname">${e.name}</span>
        <i class="fa-solid fa-arrow-up-right-from-square cbtn-ic" aria-hidden="true"></i>
      </a>`).join("")+`
    </div>`;

  /* 🔔 התראת מחיר — נשלח מייל כשהמחיר למסלול הזה יירד ליעד */
  const savedEmail=(()=>{ try{return localStorage.getItem("hipusEmail")||"";}catch{return "";} })();
  const alertUI=`
    <div class="alert-box">
      <div class="alert-head"><i class="fa-solid fa-bell" aria-hidden="true"></i> ${t.alertTitle}</div>
      <div class="alert-sub">${t.alertSub}</div>
      <div class="alert-form">
        <input type="email" id="alertEmail" class="alert-in" placeholder="${t.alertEmailPh}" value="${savedEmail}">
        <input type="number" id="alertTarget" class="alert-in" min="0" step="50" placeholder="${t.alertTargetPh}">
        <button class="alert-btn" id="alertBtn">${t.alertBtn}</button>
      </div>
      <div class="alert-msg" id="alertMsg"></div>
    </div>`;

  /* 🗓️ חיפוש גמיש (ימי שהייה=0) → חלונית כמה חודשים קדימה, הזול בכל חודש */
  const flexPanel = lastSearch.flex
    ? `<div class="flexmonths-head"><i class="fa-solid fa-calendar-week" aria-hidden="true"></i> ${t.flexMonthsTitle}</div><div class="flexmonths-sub">${t.flexMonthsHint}</div>`
      +`<div id="flexMonths" class="cal-grid"><div class="empty">${t.calLoading}</div></div>`
    : "";

  box.innerHTML=head
    +`<div class="offers-head"><i class="fa-solid fa-plane-up" aria-hidden="true"></i> ${t.offersTitle}</div><div id="offers"></div>`

/* שם חודש מקומי, למשל "אוגוסט 2026" / "August 2026" / "август 2026" */
function monthLabel(ym){
  const y=Number(ym.slice(0,4)), m=Number(ym.slice(5,7));
  const loc=currentLang==="he"?"he-IL":currentLang==="ru"?"ru-RU":"en-US";
  try{ return new Date(y,m-1,1).toLocaleDateString(loc,{month:"long",year:"numeric"}); }
  catch{ return ym; }
}
/* משיכת הזול ביותר לכל אחד מהחודשים הקרובים (חיפוש גמיש) — תאי חודש שמשתמשים באותו handler של הלוח */
async function fetchFlexMonths(s){
  const box=document.getElementById("flexMonths");
  if(!box||!s) return;
  const t=T[currentLang];
  try{
    const u=`${PROXY_BASE}/flexmonths?origin=${s.fromC.iata}&destination=${s.toC.iata}&from=${fmtISO(s.dep)}&months=4`;
    const r=await fetch(u); const d=await r.json();
    if(d&&Array.isArray(d.months)&&d.months.length){
      const cheapest=d.cheapest;
      box.innerHTML=d.months.map(m=>{
        const isMin=m.price===cheapest;
        const dt=parseISO(m.date);
        return `<button class="cal-cell${isMin?" cal-min":""}" data-cal-date="${m.date}">
          <div class="cal-d">${monthLabel(m.month)}</div>
          <div class="cal-p">${Number(m.price).toLocaleString()} ₪</div>
          <div class="cal-d">${dt?fmtDMY(dt):m.date}</div>
          ${isMin?`<div class="cal-tag">${t.calCheapest}</div>`:""}
        </button>`;
      }).join("");
    }else{
      box.innerHTML=`<div class="empty">${t.flexMonthsNone}</div>`;
    }
  }catch(e){ box.innerHTML=`<div class="empty">${t.flexMonthsNone}</div>`; }
}

/* שליחת בקשה ליצירת התראת מחיר עבור המסלול הנוכחי */
async function submitAlert(){
  const t=T[currentLang];
  const msg=document.getElementById("alertMsg");
  const email=(document.getElementById("alertEmail").value||"").trim();
  const target=Math.round(Number(document.getElementById("alertTarget").value)||0);
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ msg.textContent=t.alertBadEmail; msg.className="alert-msg err"; return; }
  if(target<=0){ msg.textContent=t.alertBadTarget; msg.className="alert-msg err"; return; }
  if(!lastSearch) return;
  const {fromC,toC,dep,ret}=lastSearch;
  const retISO=(lastSearch.flex||!ret)?"":fmtISO(ret);
  msg.textContent=t.alertSending; msg.className="alert-msg";
  try{
    const r=await fetch(`${PROXY_BASE}/alerts`,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email,origin:fromC.iata,destination:toC.iata,depart:fmtISO(dep),ret:retISO,target})});
    const d=await r.json();
    if(d&&d.ok){ try{localStorage.setItem("hipusEmail",email);}catch{} msg.textContent=t.alertOk; msg.className="alert-msg ok"; }
    else { msg.textContent=t.alertErr; msg.className="alert-msg err"; }
  }catch(e){ msg.textContent=t.alertErr; msg.className="alert-msg err"; }
}

/* ── משיכת מחיר אמיתי מה-proxy המקומי (proxy.js → Travelpayouts) ── */
/* תווית עצירות + משך טיסה (מהנתון האמיתי של Aviasales) */
function stopsHtml(n){
  if(n==null) return "";
  const t=T[currentLang];
  const cls=n===0?"s0":n===1?"s1":"s2";
  const lbl=n===0?t.sDirect:n===1?t.s1:t.s2(n);
  return ` <span class="stops-pill ${cls}">${lbl}</span>`;
}
function fmtDur(min){ if(!min) return ""; const t=T[currentLang]; return t.dur(Math.floor(min/60),min%60); }

/* כרטיס טיסה אמיתי (מ-Aviasales) — מחיר/חברה/שעות/עצירות אמיתיים, קישור רכישה עם ה-marker */
function offerCard(of,fromC,toC,isBest,flex){
  const t=T[currentLang];
  const p=Number(of.price).toLocaleString();
  const showRet=!flex;
  const durTxt=fmtDur(of.duration);
  const retDate=of.returnISO?fmtDMY(parseISO(of.returnISO)):"";
  const times=(of.departTime?`<span class="dot">·</span><span><i class="fa-solid fa-plane-departure" aria-hidden="true"></i> ${t.outTime} ${of.departTime}</span>`:"")
             +((showRet&&of.returnTime)?`<span class="dot">·</span><span><i class="fa-solid fa-plane-arrival" aria-hidden="true"></i> ${t.retTime} ${of.returnTime}</span>`:"");
  return `<a class="ticket engine-card best-card" href="${of.link}" target="_blank" rel="noopener" aria-label="${fromC.iata} ${toC.iata} ${p} ILS">
    <div class="airline">
      <div class="logo"><i class="fa-solid fa-plane-up" aria-hidden="true"></i></div>
      <div class="airline-name">Aviasales${of.airline?`<br><span class="muted-sm">${airlineName(of.airline)}</span>`:""}</div>
    </div>
    <div class="route">
      <div class="cities">${fromC.iata} <i class="fa-solid fa-arrow-right-long dir-ic" aria-hidden="true"></i> ${toC.iata}${stopsHtml(of.transfers)}${isBest?`<span class="badge"><i class="fa-solid fa-star" aria-hidden="true"></i> ${t.cheapest}</span>`:""}</div>
      <div class="meta"><span><i class="fa-regular fa-calendar" aria-hidden="true"></i> ${of.depart}</span>${retDate?`<span class="dot">·</span><span>${retDate}</span>`:""}${durTxt?`<span class="dot">·</span><span><i class="fa-regular fa-clock" aria-hidden="true"></i> ${durTxt}</span>`:""}${times}<span class="dot">·</span><span><i class="fa-solid fa-suitcase-rolling" aria-hidden="true"></i> ${t.noBag}</span></div>
    </div>
    <div class="price"><div class="ils">${p} ₪</div><div class="usd">${of.approx?t.approxLbl:t.lowestLbl}</div></div>
    <span class="buy"><i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i> ${t.aviasalesBuy}</span>
  </a>`;
}

/* משיכת כמה טיסות אמיתיות שונות (מ-Aviasales דרך השרת) — מחירים/שעות אמיתיים ומגוונים */
async function fetchOffers(s){
  const el=document.getElementById("ssPrice");
  const box=document.getElementById("offers");
  if(!s) return;
  const t=T[currentLang];
  if(el) el.textContent=t.priceChecking;
  if(box) box.innerHTML="";
  try{
    const u=`${PROXY_BASE}/offers?origin=${s.fromC.iata}&destination=${s.toC.iata}`+
            `&depart=${fmtISO(s.dep)}`+(s.ret?`&return=${fmtISO(s.ret)}`:"");
    const r=await fetch(u);
    const d=await r.json();
    if(d&&Array.isArray(d.offers)&&d.offers.length){
      const flex=!!s.flex;
      const c=d.offers[0];                                   /* הזול ביותר — לסיכום העליון */
      const cp=Number(c.price).toLocaleString();
      const perP=(pax.adults+pax.children+pax.infants)>1?` · ${t.perPerson}`:"";
      const showRet=!flex;
      const timesTxt=(c.departTime?` · ${t.outTime} ${c.departTime}`:"")+((showRet&&c.returnTime)?` · ${t.retTime} ${c.returnTime}`:"");
      if(el) el.innerHTML=t.priceFrom(cp,airlineName(c.airline),c.depart,c.approx)+timesTxt+` · ${t.noBag}`+perP;
      if(box) box.innerHTML=d.offers.map((of,i)=>offerCard(of,s.fromC,s.toC,i===0,flex)).join("");
    }else{
      if(el) el.textContent=t.priceNone;
      if(box) box.innerHTML="";
    }
  }catch(e){
    if(el) el.textContent=t.priceNone;     /* השרת לא רץ → הדף ממשיך לעבוד עם קישורי ההשוואה */
    if(box) box.innerHTML="";
  }
}

function doSearch(){
  const t=T[currentLang];
  const fromC=COUNTRIES.find(c=>c.code===fromSel.value);
  const toC  =COUNTRIES.find(c=>c.code===selectedToCode);
  if(!toC){alert(t.errTo);return}
  if(fromC.code===toC.code){alert(t.errSame);return}
  const dep=parseDMY(dateOut.value);
  if(!dep){alert(t.errDate);return}
  const n=Number(nights.value);
  if(n===0){ resolveFlexDates(fromC,toC,dep); return; }   /* ימי שהייה=0 → דו-כיווני, התאריכים עוד לא נבחרו: חפש מהתאריך והלאה את הזול */
  let ret=parseDMY(dateReturn.value);
  if(!ret){ ret=new Date(dep); ret.setDate(ret.getDate()+(n||7)); }
  lastSearch={fromC,toC,dep,ret,flex:false};
  render();
}

/* חיפוש דו-כיווני גמיש: יציאה קבועה, חזרה פתוחה — מציאת המחיר הטוב מהתאריך הזה.
   חשוב: לא נוגעים בטופס (ימי שהייה נשאר 0, תאריך חזרה נשאר ריק כפי שהוקש). */
async function resolveFlexDates(fromC,toC,dep){
  const t=T[currentLang];
  const box=document.getElementById("results");
  box.innerHTML=`<div class="results-head"><h2>${t.flexSearching}</h2></div>`;
  try{
    const u=`${PROXY_BASE}/price?origin=${fromC.iata}&destination=${toC.iata}&depart=${fmtISO(dep)}`; /* בלי return = דו-כיווני גמיש */
    const r=await fetch(u); const d=await r.json();
    if(d&&d.found&&d.returnISO){
      const fret=parseISO(d.returnISO);    /* תאריך החזרה שנמצא — לשימוש פנימי בלבד (קישורים+מחיר), בלי למלא בטופס */
      lastSearch={fromC,toC,dep,ret:fret,flex:true};
      render();
    }else{
      box.innerHTML=`<div class="results-head"><h2>${t.priceNone}</h2></div>`;
    }
  }catch(e){
    box.innerHTML=`<div class="results-head"><h2>${t.priceNone}</h2></div>`;
  }
}

/* ══════════════════════════════════════════
   🔥 טיסות סודיות / מבצעים חמים
══════════════════════════════════════════ */
function parseISO(s){ const m=/^(\d{4})-(\d{2})-(\d{2})/.exec(s||""); return m?new Date(+m[1],+m[2]-1,+m[3]):null; }

/* קודי "אזור מטרופולין" → שדה תעופה ברשימה שלנו */
const METRO={MOW:"SVO",LON:"LHR",ROM:"FCO",MIL:"MXP",PAR:"CDG",BUH:"OTP",STO:"ARN",BJS:"PEK",NYC:"JFK",OSA:"KIX",TYO:"NRT",SAO:"GRU",RIO:"GIG",BUE:"EZE"};
function findByIata(code){ return COUNTRIES.find(x=>x.iata===code)||COUNTRIES.find(x=>x.iata===METRO[code]); }

async function showDeals(){
  const t=T[currentLang];
  const box=document.getElementById("results");
  const origin=(COUNTRIES.find(c=>c.code===fromSel.value)||{iata:"TLV"}).iata;
  const budget=Math.round(Number(document.getElementById("budget").value)||0);   /* 0 = ללא הגבלה */
  const title='<i class="fa-solid fa-fire" aria-hidden="true"></i> '+(budget>0?t.dealsTitleBudget(budget.toLocaleString()):t.dealsTitle);
  box.innerHTML=`<div class="results-head"><h2>${title}</h2></div><div class="empty">${t.dealsLoading}</div>`;
  try{
    const r=await fetch(`${PROXY_BASE}/deals?origin=${origin}`);
    const d=await r.json();
    let deals=(d&&Array.isArray(d.deals))?d.deals:[];
    if(budget>0) deals=deals.filter(dl=>Number(dl.price)<=budget);   /* "לאן שבא לי": רק מה שנכנס בתקציב */
    if(deals.length){
      let rows="";
      deals.forEach(dl=>{
        const c=findByIata(dl.dest);
        const name=c?(()=>{const n=cLng(c);return `${n.c} · ${n.ct}`;})():dl.dest;
        const dep=dl.depart?fmtDMY(parseISO(dl.depart)):"";
        rows+=`<div class="ticket deal-row" data-dest="${dl.dest}" data-depart="${dl.depart}" data-ret="${dl.ret}">
          <div class="airline"><div class="logo" style="background:var(--accent2)">${dl.dest}</div></div>
          <div class="route">
            <div class="cities">${origin} <i class="fa-solid fa-arrow-right-long dir-ic" aria-hidden="true"></i> ${dl.dest}</div>
            <div class="meta"><span><i class="fa-solid fa-location-dot" aria-hidden="true"></i> ${name}</span>${dep?`<span class="dot">·</span><span>${dep}</span>`:""}</div>
          </div>
          <div class="price"><div class="ils">${Number(dl.price).toLocaleString()} ₪</div></div>
          <span class="buy"><i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i> ${t.openLive}</span>
        </div>`;
      });
      box.innerHTML=`<div class="results-head"><h2>${title}</h2></div>`+rows;
    }else{
      const none=budget>0?t.dealsBudgetNone(budget.toLocaleString()):t.dealsNone;
      box.innerHTML=`<div class="results-head"><h2>${title}</h2></div><div class="empty">${none}</div>`;
    }
  }catch(e){
    box.innerHTML=`<div class="results-head"><h2>${title}</h2></div><div class="empty">${t.dealsNone}</div>`;
  }
}

/* 📅 לוח מחירים — היום הזול בחודש (לפי היעד הנבחר + חודש תאריך היציאה) */
async function showCalendar(){
  const t=T[currentLang];
  const box=document.getElementById("results");
  const fromC=COUNTRIES.find(c=>c.code===fromSel.value);
  const toC  =COUNTRIES.find(c=>c.code===selectedToCode);
  if(!toC){ alert(t.errTo); return; }
  if(fromC.code===toC.code){ alert(t.errSame); return; }
  const dep=parseDMY(dateOut.value);
  if(!dep){ alert(t.errDate); return; }                         /* צריך תאריך כדי לדעת איזה חודש */
  const month=`${dep.getFullYear()}-${pad(dep.getMonth()+1)}`;
  const fromN=cLng(fromC), toN=cLng(toC);
  box.innerHTML=`<div class="results-head"><h2><i class="fa-solid fa-calendar-days" aria-hidden="true"></i> ${t.calTitle}</h2></div><div class="empty">${t.calLoading}</div>`;
  try{
    const r=await fetch(`${PROXY_BASE}/calendar?origin=${fromC.iata}&destination=${toC.iata}&month=${month}`);
    const d=await r.json();
    if(d&&Array.isArray(d.days)&&d.days.length){
      const cheapest=d.cheapest;
      const cells=d.days.map(day=>{
        const dt=parseISO(day.date);
        const isMin=day.price===cheapest;
        return `<button class="cal-cell${isMin?" cal-min":""}" data-cal-date="${day.date}">
          <div class="cal-d">${dt?fmtDMY(dt):day.date}</div>
          <div class="cal-p">${Number(day.price).toLocaleString()} ₪</div>
          ${isMin?`<div class="cal-tag">${t.calCheapest}</div>`:""}
        </button>`;
      }).join("");
      box.innerHTML=`<div class="results-head"><h2><i class="fa-solid fa-calendar-days" aria-hidden="true"></i> ${t.calTitle}</h2></div>
        <div class="search-summary"><div class="ss-route">${fromN.c} (${fromC.iata}) <i class="fa-solid fa-plane dir-ic" aria-hidden="true"></i> ${toN.c} (${toC.iata}) · ${month}</div>
        <div class="ss-sub">${t.calHint}</div></div>
        <div class="cal-grid">${cells}</div>`;
    }else{
      box.innerHTML=`<div class="results-head"><h2><i class="fa-solid fa-calendar-days" aria-hidden="true"></i> ${t.calTitle}</h2></div><div class="empty">${t.calNone}</div>`;
    }
  }catch(e){
    box.innerHTML=`<div class="results-head"><h2><i class="fa-solid fa-calendar-days" aria-hidden="true"></i> ${t.calTitle}</h2></div><div class="empty">${t.calNone}</div>`;
  }
}
/* לחיצה על יום בלוח → ממלא את תאריך היציאה ומריץ חיפוש */
document.addEventListener("click",e=>{
  const cell=e.target.closest(".cal-cell");
  if(!cell) return;
  const dt=parseISO(cell.dataset.calDate);
  if(dt){ dateOut.value=fmtDMY(dt); syncRet(); doSearch(); window.scrollTo({top:0,behavior:"smooth"}); }
});

/* לחיצה על מבצע → ממלא את החיפוש ומריץ אותו */
document.addEventListener("click",e=>{
  const row=e.target.closest(".deal-row");
  if(!row) return;
  const c=findByIata(row.dataset.dest);
  if(c){
    selectedToCode=c.code;
    const n=cLng(c); toInput.value=`${n.c} — ${n.ct}`; setToFlag(selectedToCode);
    const dp=parseISO(row.dataset.depart); if(dp) dateOut.value=fmtDMY(dp);
    const rt=parseISO(row.dataset.ret); if(rt){ dateReturn.value=fmtDMY(rt); syncNts(); } else { syncRet(); }
    doSearch();
    window.scrollTo({top:0,behavior:"smooth"});
  }else{
    /* יעד שלא ברשימה שלנו → פתיחת חיפוש חי ב-Google */
    const o=(COUNTRIES.find(x=>x.code===fromSel.value)||{iata:"TLV"}).iata;
    window.open(`https://www.google.com/travel/flights?q=${encodeURIComponent(`flights from ${o} to ${row.dataset.dest} on ${row.dataset.depart} returning ${row.dataset.ret}`)}`,"_blank");
  }
});
document.getElementById("dealsBtn").addEventListener("click",showDeals);
document.getElementById("calBtn").addEventListener("click",showCalendar);

/* ══════════════════════════════════════════
   👨‍👩‍👧 בורר נוסעים
══════════════════════════════════════════ */
const paxBtn=document.getElementById("paxBtn");
const paxPanel=document.getElementById("paxPanel");
function updatePaxBtn(){
  const total=pax.adults+pax.children+pax.infants;
  const bagN=bags.cabin+bags.checked;
  paxBtn.innerHTML='<i class="fa-solid fa-user" aria-hidden="true"></i><span>'+total+'</span>'
    +(bagN>0?' <span class="pax-sep">·</span><i class="fa-solid fa-suitcase-rolling" aria-hidden="true"></i><span>'+bagN+'</span>':'');
  document.getElementById("nAdults").textContent=pax.adults;
  document.getElementById("nChildren").textContent=pax.children;
  document.getElementById("nInfants").textContent=pax.infants;
  document.getElementById("nCabin").textContent=bags.cabin;
  document.getElementById("nChecked").textContent=bags.checked;
}
paxBtn.addEventListener("click",e=>{ e.stopPropagation(); paxPanel.classList.toggle("open"); });
paxPanel.addEventListener("click",e=>{
  const pb=e.target.closest("button[data-pax]");
  const bb=e.target.closest("button[data-bag]");
  if(pb){
    const k=pb.dataset.pax, min=(k==="adults")?1:0;
    pax[k]=Math.max(min,Math.min(9,pax[k]+Number(pb.dataset.dir)));
    if(pax.infants>pax.adults) pax.infants=pax.adults;   /* תינוק בחיק מבוגר */
  } else if(bb){
    const k=bb.dataset.bag;
    bags[k]=Math.max(0,Math.min(9,bags[k]+Number(bb.dataset.dir)));
  } else return;
  updatePaxBtn();
  if(lastSearch) render();                                /* רענון קישורים עם הבחירה החדשה */
});
document.addEventListener("click",e=>{ if(!e.target.closest(".pax-wrap")) paxPanel.classList.remove("open"); });
updatePaxBtn();

document.getElementById("searchBtn").addEventListener("click",doSearch);
fromSel.addEventListener("change",()=>{ setFromFlag(); if(lastSearch) render(); });
applyLang("he");          /* קובע תוויות + אייקונים (מחליף את ה-HTML הסטטי) בטעינה */
doSearch();
loadRate();
</script>
</body>
</html>
